<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buscador de Combustible</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="uiLock"></div>

<!-- LOADING OVERLAY -->
<div id="loadingOverlay">
    <div class="lo-card">
        <div class="lo-icon" id="loIcon">⛽</div>
        <div class="lo-title" id="loTitle">Buscando gasolineras</div>
        <div class="lo-sub" id="loSub">Conectando con el servidor...</div>
        <div class="lo-progress-bar"><div class="lo-progress-fill" id="loFill"></div></div>
        <div class="lo-count" id="loCount"></div>
    </div>
</div>

<div id="map"></div>

<!-- TOP SEARCH BAR -->
<div id="topBar">
    <div class="search-pill" id="singleBox">
        <span style="color:var(--muted);font-size:1rem;flex-shrink:0;">🔍</span>
        <div class="ac-wrap">
            <input type="text" id="addressInput" placeholder="Buscar dirección..." autocomplete="off" />
            <div class="autocomplete-dropdown" id="acSingle"></div>
        </div>
        <button onclick="getUserLocationAndLoad()" style="background:none;border:none;color:var(--primary);font-size:1.1rem;cursor:pointer;padding:2px 0 0;flex-shrink:0;">📍</button>
    </div>
    <button class="fab" id="refreshBtn" onclick="refreshData()" disabled title="Actualizar" style="flex-shrink:0;">🔄</button>
</div>

<!-- MODE PILLS -->
<div id="modePills">
    <button class="mode-pill active" id="tabSingle" onclick="switchMode('single')">📍 Punto</button>
    <button class="mode-pill" id="tabRoute" onclick="switchMode('route')">🗺️ Ruta</button>
</div>

<!-- RIGHT FABs -->
<div id="fabRight">
    <button class="fab" onclick="openModal('carModal')" title="Configuración">⚙️</button>
    <button class="fab" id="openRouteBtn" onclick="openModal('routeModal')" title="Configurar ruta" style="display:none;">🗺️</button>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- ROUTE MODAL -->
<div class="modal-bg" id="routeModal" onclick="if(event.target===this)closeModal('routeModal')">
    <div class="modal-sheet">
        <div class="modal-drag"></div>
        <div class="modal-head">
            <span class="modal-title">🗺️ Configurar Ruta</span>
            <button class="modal-x" onclick="closeModal('routeModal')">✕</button>
        </div>
        <div class="modal-body">
            <div class="route-row">
                <div class="pt-badge a" id="pointABadge" onclick="setMapClickTarget('A')" title="Clic en mapa">A</div>
                <div class="route-input">
                    <div class="ac-wrap">
                        <input type="text" id="pointAInput" placeholder="Origen..." autocomplete="off" />
                        <div class="autocomplete-dropdown" id="acPointA"></div>
                    </div>
                    <button class="sm-btn" onclick="searchPoint('A')">🔍</button>
                    <button class="sm-btn" onclick="useMyLocationForPoint('A')">📍</button>
                </div>
            </div>
            <div class="route-row" style="margin:2px 0 4px;">
                <div class="divider-line"></div>
                <button class="sm-btn" onclick="invertRoute()">⇅</button>
                <div class="divider-line"></div>
            </div>
            <div class="route-row">
                <div class="pt-badge b" id="pointBBadge" onclick="setMapClickTarget('B')" title="Clic en mapa">B</div>
                <div class="route-input">
                    <div class="ac-wrap">
                        <input type="text" id="pointBInput" placeholder="Destino..." autocomplete="off" />
                        <div class="autocomplete-dropdown" id="acPointB"></div>
                    </div>
                    <button class="sm-btn" onclick="searchPoint('B')">🔍</button>
                    <button class="sm-btn" onclick="useMyLocationForPoint('B')">📍</button>
                </div>
            </div>
            <div class="corridor-row">
                <span class="corridor-label">Corredor:
                    <select id="corridorSelect">
                        <option value="3">3 km</option>
                        <option value="5" selected>5 km</option>
                        <option value="10">10 km</option>
                        <option value="20">20 km</option>
                    </select>
                </span>
                <button class="btn-go" onclick="traceRoute()">🗺️ Trazar Ruta</button>
            </div>
        </div>
    </div>
</div>

<!-- CONFIG MODAL -->
<div class="modal-bg" id="carModal" onclick="if(event.target===this)closeModal('carModal')">
    <div class="modal-sheet">
        <div class="modal-drag"></div>
        <div class="modal-head">
            <span class="modal-title">⚙️ Configuración</span>
            <button class="modal-x" onclick="closeModal('carModal')">✕</button>
        </div>
        <div class="modal-body">
            <div class="m-label">⛽ Tipo de Combustible</div>
            <div class="fuel-grid">
                <label class="fuel-opt"><input type="radio" name="fuelType" id="filter-g95" value="g95" checked><span>Gasolina 95</span></label>
                <label class="fuel-opt"><input type="radio" name="fuelType" id="filter-g98" value="g98"><span>Gasolina 98</span></label>
                <label class="fuel-opt"><input type="radio" name="fuelType" id="filter-diesel" value="diesel"><span>Gasóleo A</span></label>
                <label class="fuel-opt"><input type="radio" name="fuelType" id="filter-dieselb" value="dieselb"><span>Gasóleo B</span></label>
            </div>
            <div class="m-label">📊 Ordenar por</div>
            <select id="sortSelect" style="width:100%;margin-bottom:2px;">
                <option value="distance">Cercanía</option>
                <option value="price">Precio más barato</option>
                <option value="savings" selected>💰 Mayor ahorro neto</option>
            </select>
            <div class="m-label">🚗 Mi Coche</div>
            <div class="cfg-row">
                <div class="cfg-field">
                    <label>Consumo (l/100km)</label>
                    <input type="number" id="carConsumption" class="cfg-input" min="3" max="25" step="0.5" value="7" />
                </div>
                <div class="cfg-field">
                    <label>Litros a repostar</label>
                    <input type="number" id="carLiters" class="cfg-input" min="10" max="120" step="5" value="50" />
                </div>
            </div>
        </div>
    </div>
</div>

<!-- BOTTOM SHEET -->
<div id="sheet">
    <div id="sheet-handle" onclick="toggleSheet()"><div class="handle-bar"></div></div>
    <div id="sheet-header" onclick="toggleSheet()">
        <div>
            <div id="sheet-title">Gasolineras Cercanas</div>
            <div id="sheet-meta">Busca tu ubicación para comenzar</div>
        </div>
        <span id="sheet-chevron">▲</span>
    </div>
    <div id="sheet-body">
        <div id="routeInfoBar"></div>
        <div id="routeAlternatives">
            <div class="alt-label">Rutas disponibles</div>
            <div id="routeAltList"></div>
        </div>
        <div id="stationList"><div class="loading">Busca tu ubicación para comenzar</div></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
